{% extends 'base.html' %}

{% block title %}{{ post.title }}{% endblock %}

{% block content %}

<div class="post-card">
    <h1>{{ post.title }}</h1>

    <p>{{ post.content }}</p>
    {% if post.image %}
        <img src="{{ post.image.url }}" alt="{{ post.title }}" class="detail-image">
    {% endif %}

    <small>
        By {{ post.author.username }} • Published {{ post.created_at|date:"F d, Y" }}
    </small>
</div>

{% endblock %}
